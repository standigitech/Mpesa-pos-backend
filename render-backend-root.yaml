services:
  - type: web
    name: mpesa-backend-root
    env: node
    branch: master
    region: oregon
    plan: starter
    root: mpesa_backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MPESA_API_URL
        value: "https://api.safaricom.co.ke"
    secretEnvVars:
      - key: CONSUMER_KEY
        name: mpesa_consumer_key
      - key: CONSUMER_SECRET
        name: mpesa_consumer_secret
      - key: SHORTCODE
        name: mpesa_shortcode
      - key: PASSKEY
        name: mpesa_passkey
      - key: CALLBACK_URL
        name: mpesa_callback_url
